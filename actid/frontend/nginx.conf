server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ID scans / selfies are PNG dataURLs and can easily run 5–10 MB on
    # phones with high-res cameras. Default 1m would 413-reject them.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — every unknown route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
