services:
  backend:
    build: ./backend
    container_name: actid-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/actid.db
      - SECRET_KEY=actid-hackathon-cluj-2026-super-secret
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1
    volumes:
      - actid-db:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: actid-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  actid-db:
