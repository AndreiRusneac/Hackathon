version: "3.9"

services:
  backend:
    build: ./backend
    container_name: actid-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - actid-db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/actid.db
      - SECRET_KEY=actid-hackathon-cluj-2026-super-secret
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: actid-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  actid-db: